<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <mask id="center-mask">
      <rect width="400" height="240" fill="white"/>
      <circle cx="200" cy="120" r="120" fill="black"/>
    </mask>
  </defs>
  <!-- Side circles, masked to cut where center overlaps -->
  <circle cx="110" cy="120" r="90" fill="#10B981" mask="url(#center-mask)"/>
  <circle cx="290" cy="120" r="90" fill="#10B981" mask="url(#center-mask)"/>
  <!-- Center circle (no contour fill - the gap is transparent) -->
  <circle cx="200" cy="120" r="108" fill="#10B981"/>
</svg>