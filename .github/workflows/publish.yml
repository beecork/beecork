name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (use "none" to publish current version as-is)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # npm publish --provenance
    steps:
      # Actions pinned to commit SHAs (not mutable @v6 tags) — the job holds NPM_TOKEN.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        if: ${{ inputs.version_bump != 'none' }}
        run: npm version ${{ inputs.version_bump }}

      # Push the version commit + tag BEFORE publishing: if the push fails (branch protection,
      # race), git and npm stay in sync (nothing published) — the safer failure than npm ahead of git.
      - name: Push version commit and tag
        if: ${{ inputs.version_bump != 'none' }}
        run: git push && git push --tags

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
