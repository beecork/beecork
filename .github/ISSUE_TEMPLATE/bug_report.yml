name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `beecork start`
        2. Send a message via Telegram
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Beecork version
      description: Run `beecork --version`
      placeholder: "1.3.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version`
      placeholder: "v20.11.0"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (`beecork logs`)
      render: shell
